name: Release Pipeline

on:
  push:
    branches:
      - release/v*
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true

env:
  WORKSPACE_ROOT: ${{ github.workspace }}/workspace
  PYTHON_VERSION: "3.13"
  LIVE_PHANTOM_URL: http://localhost:8008
  LIVE_CEREBRO_URL: http://localhost:8002
  LIVE_SECURELLM_URL: http://localhost:8081
  LIVE_OWASAKA_URL: http://localhost:8080
  LIVE_PROMETHEUS_URL: http://localhost:9090
  LIVE_GRAFANA_URL: http://localhost:3001
  LIVE_NATS_URL: nats://localhost:4222

jobs:
  integration-gate:
    name: Integration Gate
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - name: Materialize release workspace dependencies
        env:
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_REPOS: adr-ledger,cerebro,phantom,spectre,owasaka,securellm-bridge
        run: bash .github/scripts/materialize-sentinel-workspace.sh

      - name: Sentinel flake check
        run: nix flake check --no-build

      - name: Sentinel package build
        run: nix build .#default --print-build-logs

      - name: Normalize observability config permissions
        run: |
          chmod 644 \
            "${{ env.WORKSPACE_ROOT }}/spectre/prometheus.yml" \
            "${{ env.WORKSPACE_ROOT }}/spectre/config/alerts.yml" \
            "${{ env.WORKSPACE_ROOT }}/spectre/config/loki-config.yml" \
            "${{ env.WORKSPACE_ROOT }}/spectre/config/promtail-config.yml" \
            "${{ env.WORKSPACE_ROOT }}/spectre/config/grafana/provisioning/datasources/prometheus.yml" \
            "${{ env.WORKSPACE_ROOT }}/spectre/config/grafana/provisioning/datasources/loki.yml"

      - name: Run full test suite
        env:
          SENTINEL_USE_LIVE_STACK: "1"
          SENTINEL_WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_PHANTOM_TEST_URL: ${{ env.LIVE_PHANTOM_URL }}
          SENTINEL_PHANTOM_HEALTH_URL: ${{ env.LIVE_PHANTOM_URL }}/health
          SENTINEL_PUBLIC_PHANTOM_URL: ${{ env.LIVE_PHANTOM_URL }}
          SENTINEL_CEREBRO_URL: ${{ env.LIVE_CEREBRO_URL }}
          SENTINEL_SECURELLM_URL: ${{ env.LIVE_SECURELLM_URL }}
          SENTINEL_OWASAKA_URL: ${{ env.LIVE_OWASAKA_URL }}
          SENTINEL_PROMETHEUS_URL: ${{ env.LIVE_PROMETHEUS_URL }}
          SENTINEL_GRAFANA_URL: ${{ env.LIVE_GRAFANA_URL }}
          SENTINEL_NATS_URL: ${{ env.LIVE_NATS_URL }}
          SENTINEL_NATS_HEALTH_URL: http://localhost:8222/healthz
          NATS_URL: ${{ env.LIVE_NATS_URL }}
        run: |
          nix develop --command bash -lc '
            poetry install --no-interaction --no-root -E nats
            mkdir -p reports
            docker compose --profile core --profile intelligence --profile observability up -d
            sleep 45
            pytest \
              test_comprehensive_integration.py \
              scenarios/ chaos/ performance/ \
              -v --tb=short \
              --junitxml=reports/junit-release-gate.xml
          '

      - name: Capture gate logs
        if: always()
        run: |
          docker compose ps --all
          docker compose logs --tail=200 > /tmp/release-gate.log || true

      - name: Upload gate results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-gate-results
          path: |
            reports/
            /tmp/release-gate.log

      - name: Teardown
        if: always()
        run: docker compose down -v --remove-orphans

  version:
    name: Resolve Version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            branch="${{ github.ref_name }}"
            echo "version=${branch#release/v}" >> "$GITHUB_OUTPUT"
          fi

  packaging-deb:
    name: Package (.deb)
    runs-on: ubuntu-24.04
    needs: [integration-gate, version]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: dtolnay/rust-toolchain@stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install packaging dependencies
        run: gem install --no-document fpm

      - name: Materialize packaging workspace dependencies
        env:
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_REPOS: ai-agent-os,securellm-bridge,phantom-nx,owasaka,phantom,cerebro,spooknix
        run: bash .github/scripts/materialize-sentinel-workspace.sh

      - name: Build Debian packages
        env:
          VERSION: ${{ needs.version.outputs.version }}
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
        run: bash packaging/deb/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb

  packaging-rpm:
    name: Package (.rpm)
    runs-on: ubuntu-24.04
    needs: [integration-gate, version]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: dtolnay/rust-toolchain@stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install packaging dependencies
        run: |
          gem install --no-document fpm
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Materialize packaging workspace dependencies
        env:
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_REPOS: ai-agent-os,securellm-bridge,phantom-nx,owasaka,phantom,cerebro,spooknix
        run: bash .github/scripts/materialize-sentinel-workspace.sh

      - name: Build RPM packages
        env:
          VERSION: ${{ needs.version.outputs.version }}
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
        run: bash packaging/rpm/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: dist/*.rpm

  packaging-macos:
    name: Package (macOS)
    runs-on: macos-15
    needs: [integration-gate, version]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Materialize packaging workspace dependencies
        env:
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_REPOS: ai-agent-os,securellm-bridge,phantom-nx
        run: bash .github/scripts/materialize-sentinel-workspace.sh

      - name: Build macOS artifacts
        env:
          VERSION: ${{ needs.version.outputs.version }}
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
        run: bash packaging/macos/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: dist/macos/

  packaging-windows:
    name: Package (Windows)
    runs-on: windows-2025
    needs: [integration-gate, version]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Materialize packaging workspace dependencies
        shell: bash
        env:
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_REPOS: ai-agent-os,securellm-bridge,phantom-nx
        run: bash .github/scripts/materialize-sentinel-workspace.sh

      - name: Build Windows packages
        shell: pwsh
        run: |
          $env:VERSION = "${{ needs.version.outputs.version }}"
          $env:WORKSPACE_ROOT = (Resolve-Path "${{ env.WORKSPACE_ROOT }}").Path
          .\packaging\windows\build.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/windows/

  github-release:
    name: GitHub Release v${{ needs.version.outputs.version }}
    runs-on: ubuntu-24.04
    needs:
      - version
      - packaging-deb
      - packaging-rpm
      - packaging-macos
      - packaging-windows

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract CHANGELOG entry
        id: changelog
        run: |
          version="${{ needs.version.outputs.version }}"
          notes=$(awk "/## \[$version\]/,/## \[/" CHANGELOG.md | head -n -1)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$notes" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: voidnxlabs v${{ needs.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, 'beta') || contains(needs.version.outputs.version, 'alpha') }}
          files: |
            dist/deb-packages/*.deb
            dist/rpm-packages/*.rpm
            dist/macos-packages/*
            dist/windows-packages/*
