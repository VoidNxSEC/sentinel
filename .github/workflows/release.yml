name: Release Pipeline

on:
  push:
    branches:
      - release/v*
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true

env:
  REGISTRY: ghcr.io
  ORG: VoidNxSEC
  PYTHON_VERSION: '3.13'

jobs:
  # ──────────────────────────────────────────────
  # 1. Full integration gate
  # ──────────────────────────────────────────────
  integration-gate:
    name: Integration Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: '1.7.0'

      - name: Install dependencies
        run: |
          cd sentinel
          poetry install --no-interaction -E nats

      - name: Start full stack
        run: |
          docker compose --profile core --profile intelligence up -d
          sleep 45

      - name: Run full test suite
        run: |
          cd sentinel
          poetry run pytest \
            test_comprehensive_integration.py \
            scenarios/ chaos/ performance/ \
            -v --tb=short \
            --junitxml=reports/junit-release-gate.xml

      - name: Upload gate results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-gate-results
          path: sentinel/reports/

      - name: Teardown
        if: always()
        run: docker compose --profile core --profile intelligence down -v

  # ──────────────────────────────────────────────
  # 2. Extract version
  # ──────────────────────────────────────────────
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Extract from branch name: release/v0.2.0 → 0.2.0
            BRANCH="${{ github.ref_name }}"
            echo "version=${BRANCH#release/v}" >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────────────────────────
  # 3. Build + push Docker images to GHCR
  # ──────────────────────────────────────────────
  docker-images:
    name: Build Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [integration-gate, version]

    strategy:
      matrix:
        service:
          - phantom-api
          - owasaka
          - cerebro
          - securellm-bridge
          - spooknix
          - ml-ops-api
          - phantom-nx

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service }}:v${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 4. Nix flake outputs
  # ──────────────────────────────────────────────
  nix-build:
    name: Nix Build
    runs-on: ubuntu-latest
    needs: [integration-gate, version]

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            extra-substituters = https://voidnxsec.cachix.org
            extra-trusted-public-keys = voidnxsec.cachix.org-1:placeholder=

      - uses: cachix/cachix-action@v14
        with:
          name: voidnxsec
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build sentinel flake
        run: |
          cd sentinel
          nix build .#integration-tests --print-build-logs

      - name: Build NixOS module
        run: nix build ./packaging/nix#nixosModules.voidnxlabs-stack --print-build-logs || true

  # ──────────────────────────────────────────────
  # 5. Cross-platform packaging
  # ──────────────────────────────────────────────
  packaging-deb:
    name: Package (.deb)
    runs-on: ubuntu-latest
    needs: [docker-images, version]

    steps:
      - uses: actions/checkout@v4
      - name: Build Debian packages
        run: |
          chmod +x packaging/deb/build.sh
          VERSION=${{ needs.version.outputs.version }} packaging/deb/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb

  packaging-rpm:
    name: Package (.rpm)
    runs-on: ubuntu-latest
    needs: [docker-images, version]

    steps:
      - uses: actions/checkout@v4
      - name: Install rpm tools
        run: sudo apt-get install -y rpm
      - name: Build RPM packages
        run: |
          chmod +x packaging/rpm/build.sh
          VERSION=${{ needs.version.outputs.version }} packaging/rpm/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: dist/*.rpm

  packaging-macos:
    name: Package (macOS)
    runs-on: macos-latest
    needs: [docker-images, version]

    steps:
      - uses: actions/checkout@v4
      - name: Build macOS artifacts
        run: |
          chmod +x packaging/macos/build.sh
          VERSION=${{ needs.version.outputs.version }} packaging/macos/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: dist/macos/

  packaging-windows:
    name: Package (Windows)
    runs-on: windows-latest
    needs: [docker-images, version]

    steps:
      - uses: actions/checkout@v4
      - name: Build Windows packages
        shell: pwsh
        run: |
          $env:VERSION = "${{ needs.version.outputs.version }}"
          .\packaging\windows\build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/windows/

  # ──────────────────────────────────────────────
  # 6. GitHub Release
  # ──────────────────────────────────────────────
  github-release:
    name: GitHub Release v${{ needs.version.outputs.version }}
    runs-on: ubuntu-latest
    needs:
      - version
      - docker-images
      - nix-build
      - packaging-deb
      - packaging-rpm

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract CHANGELOG entry
        id: changelog
        run: |
          VERSION=${{ needs.version.outputs.version }}
          NOTES=$(awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | head -n -1)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: voidnxlabs v${{ needs.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, 'beta') || contains(needs.version.outputs.version, 'alpha') }}
          files: |
            dist/deb-packages/*.deb
            dist/rpm-packages/*.rpm
            dist/macos-packages/*
            dist/windows-packages/*
