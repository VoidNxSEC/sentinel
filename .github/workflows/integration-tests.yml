name: Integration Tests

on:
  push:
    branches:
      - main
      - develop
      - feature/*
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode"
        required: true
        default: "quick"
        type: choice
        options:
          - quick
          - full
          - chaos-only

env:
  WORKSPACE_ROOT: ${{ github.workspace }}/workspace
  LIVE_PHANTOM_URL: http://localhost:8008
  LIVE_CEREBRO_URL: http://localhost:8002
  LIVE_SECURELLM_URL: http://localhost:8081
  LIVE_OWASAKA_URL: http://localhost:8080
  LIVE_NATS_URL: nats://localhost:4222
  LIVE_NATS_HEALTH_URL: http://localhost:8222/healthz

permissions:
  contents: read

concurrency:
  group: sentinel-integration-${{ github.ref }}-${{ github.event.inputs.test_mode || github.event_name }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: Sentinel Flake Check
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - name: Validate helper scripts
        run: bash -n .github/scripts/materialize-sentinel-workspace.sh

      - name: Run flake checks (eval only)
        run: nix flake check --no-build

  build-package:
    name: Sentinel Package Build
    runs-on: ubuntu-24.04
    needs: flake-check

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - name: Build sentinel package
        run: nix build .#default --print-build-logs

  quick-tests:
    name: Quick Tests (E2E + Compliance)
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.event.inputs.test_mode == 'quick'
    needs: build-package

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - name: Materialize sentinel workspace dependencies
        env:
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_REPOS: adr-ledger,phantom,cerebro,spectre,owasaka,securellm-bridge
        run: bash .github/scripts/materialize-sentinel-workspace.sh

      - name: Run quick integration tests
        env:
          SENTINEL_USE_LIVE_STACK: "1"
          SENTINEL_WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_PHANTOM_TEST_URL: ${{ env.LIVE_PHANTOM_URL }}
          SENTINEL_PHANTOM_HEALTH_URL: ${{ env.LIVE_PHANTOM_URL }}/health
          SENTINEL_PUBLIC_PHANTOM_URL: ${{ env.LIVE_PHANTOM_URL }}
          SENTINEL_CEREBRO_URL: ${{ env.LIVE_CEREBRO_URL }}
          SENTINEL_SECURELLM_URL: ${{ env.LIVE_SECURELLM_URL }}
          SENTINEL_OWASAKA_URL: ${{ env.LIVE_OWASAKA_URL }}
          SENTINEL_NATS_URL: ${{ env.LIVE_NATS_URL }}
          SENTINEL_NATS_HEALTH_URL: ${{ env.LIVE_NATS_HEALTH_URL }}
          NATS_URL: ${{ env.LIVE_NATS_URL }}
        run: |
          nix develop --command bash -lc '
            poetry install --no-interaction --no-root -E nats
            mkdir -p reports
            docker compose --profile core --profile intelligence up -d
            sleep 45
            pytest test_comprehensive_integration.py \
              -v -m "not slow" \
              --junitxml=reports/junit-quick.xml \
              --tb=short
          '

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quick-test-results
          path: reports/

      - name: Capture quick test logs
        if: failure()
        run: docker compose logs --tail=200 > /tmp/sentinel-quick-tests.log || true

      - name: Upload quick test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quick-test-logs
          path: /tmp/sentinel-quick-tests.log

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans

  scenario-tests:
    name: Scenario Tests — ${{ matrix.scenario }}
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event.inputs.test_mode == 'full'
    needs: build-package

    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: spectre-e2e
            test_file: scenarios/test_spectre_e2e.py
            profiles: --profile core --profile intelligence
            repos: adr-ledger,cerebro,phantom,spectre,owasaka,securellm-bridge
          - scenario: phantom-e2e
            test_file: scenarios/test_phantom_e2e.py
            profiles: --profile core --profile intelligence
            repos: adr-ledger,cerebro,phantom,spectre,owasaka,securellm-bridge
          - scenario: ai-agent-e2e
            test_file: scenarios/test_ai_agent_e2e.py
            profiles: --profile core --profile intelligence
            repos: adr-ledger,cerebro,phantom,spectre,owasaka,securellm-bridge
          - scenario: securellm-e2e
            test_file: scenarios/test_securellm_e2e.py
            profiles: --profile core --profile intelligence
            repos: adr-ledger,cerebro,phantom,spectre,owasaka,securellm-bridge
          - scenario: ml-pipeline-e2e
            test_file: scenarios/test_ml_pipeline_e2e.py
            profiles: --profile core --profile intelligence
            repos: adr-ledger,cerebro,phantom,spectre,owasaka,securellm-bridge
          - scenario: observability-e2e
            test_file: scenarios/test_observability_e2e.py
            profiles: --profile core --profile intelligence --profile observability
            repos: adr-ledger,cerebro,phantom,spectre,owasaka,securellm-bridge
          - scenario: cortex-e2e
            test_file: scenarios/test_cortex_e2e.py
            profiles: --profile core --profile intelligence
            repos: adr-ledger,cerebro,phantom,spectre,owasaka,securellm-bridge

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - name: Materialize scenario workspace dependencies
        env:
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_REPOS: ${{ matrix.repos }}
        run: bash .github/scripts/materialize-sentinel-workspace.sh

      - name: Normalize observability config permissions
        if: ${{ matrix.scenario == 'observability-e2e' }}
        run: |
          chmod 644 \
            "${{ env.WORKSPACE_ROOT }}/spectre/prometheus.yml" \
            "${{ env.WORKSPACE_ROOT }}/spectre/config/alerts.yml" \
            "${{ env.WORKSPACE_ROOT }}/spectre/config/loki-config.yml" \
            "${{ env.WORKSPACE_ROOT }}/spectre/config/promtail-config.yml" \
            "${{ env.WORKSPACE_ROOT }}/spectre/config/grafana/provisioning/datasources/prometheus.yml" \
            "${{ env.WORKSPACE_ROOT }}/spectre/config/grafana/provisioning/datasources/loki.yml"

      - name: Run ${{ matrix.scenario }}
        env:
          SENTINEL_USE_LIVE_STACK: "1"
          SENTINEL_WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_PHANTOM_TEST_URL: ${{ env.LIVE_PHANTOM_URL }}
          SENTINEL_PHANTOM_HEALTH_URL: ${{ env.LIVE_PHANTOM_URL }}/health
          SENTINEL_PUBLIC_PHANTOM_URL: ${{ env.LIVE_PHANTOM_URL }}
          SENTINEL_CEREBRO_URL: ${{ env.LIVE_CEREBRO_URL }}
          SENTINEL_SECURELLM_URL: ${{ env.LIVE_SECURELLM_URL }}
          SENTINEL_OWASAKA_URL: ${{ env.LIVE_OWASAKA_URL }}
          SENTINEL_NATS_URL: ${{ env.LIVE_NATS_URL }}
          SENTINEL_NATS_HEALTH_URL: ${{ env.LIVE_NATS_HEALTH_URL }}
          SENTINEL_PROMETHEUS_URL: http://localhost:9090
          SENTINEL_GRAFANA_URL: http://localhost:3001
          NATS_URL: ${{ env.LIVE_NATS_URL }}
        run: |
          nix develop --command bash -lc '
            poetry install --no-interaction --no-root -E nats
            docker compose ${{ matrix.profiles }} up -d
            sleep 45
            mkdir -p reports
            pytest ${{ matrix.test_file }} \
              -v -m e2e \
              --junitxml=reports/junit-${{ matrix.scenario }}.xml \
              --tb=short
          '

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scenario-${{ matrix.scenario }}-results
          path: reports/

      - name: Service logs on failure
        if: failure()
        run: docker compose logs --tail=200 > /tmp/${{ matrix.scenario }}.log || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-${{ matrix.scenario }}-logs
          path: /tmp/${{ matrix.scenario }}.log

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans

  chaos-tests:
    name: Chaos Engineering
    runs-on: ubuntu-24.04
    if: github.event.inputs.test_mode == 'chaos-only' || github.event_name == 'schedule'
    needs: build-package

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - name: Materialize chaos workspace dependencies
        env:
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_REPOS: adr-ledger,cerebro,phantom,spectre,owasaka,securellm-bridge
        run: bash .github/scripts/materialize-sentinel-workspace.sh

      - name: Run chaos tests
        env:
          SENTINEL_USE_LIVE_STACK: "1"
          SENTINEL_WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_PHANTOM_TEST_URL: ${{ env.LIVE_PHANTOM_URL }}
          SENTINEL_PHANTOM_HEALTH_URL: ${{ env.LIVE_PHANTOM_URL }}/health
          SENTINEL_PUBLIC_PHANTOM_URL: ${{ env.LIVE_PHANTOM_URL }}
          SENTINEL_CEREBRO_URL: ${{ env.LIVE_CEREBRO_URL }}
          SENTINEL_SECURELLM_URL: ${{ env.LIVE_SECURELLM_URL }}
          SENTINEL_OWASAKA_URL: ${{ env.LIVE_OWASAKA_URL }}
          SENTINEL_NATS_URL: ${{ env.LIVE_NATS_URL }}
          SENTINEL_NATS_HEALTH_URL: ${{ env.LIVE_NATS_HEALTH_URL }}
          NATS_URL: ${{ env.LIVE_NATS_URL }}
        run: |
          nix develop --command bash -lc '
            poetry install --no-interaction --no-root -E nats
            docker compose --profile core --profile intelligence up -d
            sleep 45
            mkdir -p reports
            pytest chaos/ -v -m chaos \
              --junitxml=reports/junit-chaos.xml \
              --tb=short
          '

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chaos-test-results
          path: reports/

      - name: Capture chaos logs
        if: failure()
        run: docker compose logs --tail=200 > /tmp/sentinel-chaos.log || true

      - name: Upload chaos logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-test-logs
          path: /tmp/sentinel-chaos.log

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-package

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - name: Materialize performance workspace dependencies
        env:
          WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_REPOS: adr-ledger,cerebro,phantom,spectre,owasaka,securellm-bridge,spooknix
        run: bash .github/scripts/materialize-sentinel-workspace.sh

      - name: Run performance tests
        env:
          SENTINEL_USE_LIVE_STACK: "1"
          SENTINEL_WORKSPACE_ROOT: ${{ env.WORKSPACE_ROOT }}
          SENTINEL_PHANTOM_TEST_URL: ${{ env.LIVE_PHANTOM_URL }}
          SENTINEL_PHANTOM_HEALTH_URL: ${{ env.LIVE_PHANTOM_URL }}/health
          SENTINEL_PUBLIC_PHANTOM_URL: ${{ env.LIVE_PHANTOM_URL }}
          SENTINEL_CEREBRO_URL: ${{ env.LIVE_CEREBRO_URL }}
          SENTINEL_SECURELLM_URL: ${{ env.LIVE_SECURELLM_URL }}
          SENTINEL_OWASAKA_URL: ${{ env.LIVE_OWASAKA_URL }}
          SENTINEL_NATS_URL: ${{ env.LIVE_NATS_URL }}
          SENTINEL_NATS_HEALTH_URL: ${{ env.LIVE_NATS_HEALTH_URL }}
          NATS_URL: ${{ env.LIVE_NATS_URL }}
        run: |
          nix develop --command bash -lc '
            poetry install --no-interaction --no-root -E nats
            docker compose --profile core --profile intelligence up -d
            sleep 45
            mkdir -p reports
            pytest performance/ -v -m performance \
              --junitxml=reports/junit-performance.xml \
              --tb=short
          '

      - name: Save benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-benchmarks
          path: reports/

      - name: Capture performance logs
        if: failure()
        run: docker compose logs --tail=200 > /tmp/sentinel-performance.log || true

      - name: Upload performance logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: performance-benchmark-logs
          path: /tmp/sentinel-performance.log

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans

  test-summary:
    name: Test Summary
    runs-on: ubuntu-24.04
    needs: [flake-check, build-package, quick-tests, scenario-tests, chaos-tests, performance-benchmarks]
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-test-results

      - name: Generate summary
        run: |
          echo "## Integration Test Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Category | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for dir in all-test-results/*/; do
            name=$(basename "$dir")
            echo "| $name | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          done
