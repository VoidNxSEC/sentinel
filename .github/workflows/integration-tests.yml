name: Integration Tests

on:
  push:
    branches:
      - main
      - develop
      - feature/*
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full
          - chaos-only

env:
  PYTHON_VERSION: '3.13'
  POETRY_VERSION: '1.7.0'

jobs:
  quick-tests:
    name: Quick Tests (E2E + Compliance)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.inputs.test_mode == 'quick'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached dependencies
        id: cached-deps
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-deps.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root -E nats

      - name: Start test services
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 30

      - name: Health check
        run: |
          curl -f http://localhost:8000/health || echo "phantom not ready"
          curl -f http://localhost:8222/healthz || echo "NATS not ready"

      - name: Run quick tests
        run: |
          poetry run pytest test_comprehensive_integration.py \
            -v -m "not slow" \
            --junitxml=reports/junit-quick.xml \
            --tb=short

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quick-test-results
          path: reports/

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  full-integration-tests:
    name: Full Integration — ${{ matrix.test-category }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.test_mode == 'full'

    strategy:
      fail-fast: false
      matrix:
        test-category:
          - e2e
          - compliance
          - performance
          - chaos

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction -E nats

      - name: Start test services
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 30

      - name: Run ${{ matrix.test-category }} tests
        run: |
          poetry run pytest \
            test_comprehensive_integration.py \
            scenarios/ chaos/ performance/ \
            -v -m "${{ matrix.test-category }}" \
            --junitxml=reports/junit-${{ matrix.test-category }}.xml \
            --tb=short

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.test-category }}-test-results
          path: reports/

      - name: Service logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  scenario-tests:
    name: Scenario Tests — ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.test_mode == 'full'

    strategy:
      fail-fast: false
      matrix:
        scenario:
          - spectre-e2e
          - phantom-e2e
          - ai-agent-e2e
          - securellm-e2e

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction -E nats

      - name: Start core services (unified compose)
        run: |
          cd ..
          docker compose --profile core up -d
          sleep 30

      - name: Health check core services
        run: |
          curl -f http://localhost:8222/healthz
          curl -f http://localhost:8008/health || true
          curl -f http://localhost:8080/health || true

      - name: Run ${{ matrix.scenario }} scenario
        run: |
          poetry run pytest \
            scenarios/test_${{ matrix.scenario | replace('-', '_') }}.py \
            -v -m e2e \
            --junitxml=reports/junit-${{ matrix.scenario }}.xml \
            --tb=short

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scenario-${{ matrix.scenario }}-results
          path: reports/

      - name: Cleanup
        if: always()
        run: |
          cd ..
          docker compose --profile core down -v

  chaos-tests:
    name: Chaos Engineering
    runs-on: ubuntu-latest
    if: github.event.inputs.test_mode == 'chaos-only' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction -E nats

      - name: Start core services
        run: |
          cd ..
          docker compose --profile core up -d
          sleep 30

      - name: Run chaos tests
        run: |
          poetry run pytest chaos/ \
            -v -m chaos \
            --junitxml=reports/junit-chaos.xml \
            --tb=short

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chaos-test-results
          path: reports/

      - name: Cleanup
        if: always()
        run: |
          cd ..
          docker compose --profile core down -v

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction -E nats

      - name: Start core services
        run: |
          cd ..
          docker compose --profile core up -d
          sleep 30

      - name: Run performance tests
        run: |
          poetry run pytest performance/ \
            -v -m performance \
            --junitxml=reports/junit-performance.xml \
            --tb=short

      - name: Save benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-benchmarks
          path: reports/

      - name: Cleanup
        if: always()
        run: |
          cd ..
          docker compose --profile core down -v

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [quick-tests, full-integration-tests]
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-test-results

      - name: Generate summary
        run: |
          echo "## Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          for dir in all-test-results/*/; do
            name=$(basename "$dir")
            echo "| $name | ✅ |" >> $GITHUB_STEP_SUMMARY
          done
