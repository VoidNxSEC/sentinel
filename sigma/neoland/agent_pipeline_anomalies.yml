title: Neoland NATS Connection Spike
id: a3b2c1d0-5e6f-4789-8901-2a3b4c5d6e7f
status: experimental
level: low
description: |
  Detects a burst of NATS connections from the neoland service in a
  short window. May indicate reconnect storm or unauthorized service
  impersonating neoland's NKey identity.
author: VoidNxLabs SOC
date: 2026/04/07
tags:
  - attack.command_and_control
  - attack.t1571
  - neoland.nats
logsource:
  category: network_connection
  product: linux
detection:
  selection:
    DestinationPort: 4222
    Image|endswith: '/neoland'
  timeframe: 1m
  condition: selection | count() > 20
falsepositives:
  - Service restart during rolling deploy
  - NATS server restart causing mass reconnect
