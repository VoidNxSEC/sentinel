title: Neoland Agent Pipeline Process Anomalies
id: f7a1c0d8-4e3b-4a5f-b8e2-1c9d6a0f3e7b
status: stable
level: medium
description: |
  Detects anomalous process spawning from the neoland agent pipeline.
  The DSPy pipeline (port 8001) and control-plane should only spawn
  expected subprocesses. Unknown child processes may indicate compromise
  or prompt injection leading to code execution.
author: VoidNxLabs SOC
date: 2026/04/07
tags:
  - attack.execution
  - attack.t1059
  - neoland.pipeline
logsource:
  category: process_creation
  product: linux
detection:
  selection_parent:
    ParentImage|endswith:
      - '/neoland'
      - '/python3.13'
      - '/uvicorn'
    ParentCommandLine|contains:
      - 'neoland_agents'
      - 'neoland-server'
      - 'dspy-pipeline'
  filter_expected:
    Image|endswith:
      - '/python3.13'
      - '/neoland'
      - '/curl'       # health checks
      - '/psql'       # DB migrations
  condition: selection_parent and not filter_expected
falsepositives:
  - Custom post-processing scripts invoked by pipeline plugins
  - Debug tools launched manually during development
