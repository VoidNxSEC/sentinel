title: Neoland Checkpoint Write Outside Expected Path
id: d4e5f6a7-8b9c-0d1e-2f3a-4b5c6d7e8f90
status: stable
level: high
description: |
  Detects neoland writing ADR checkpoint files outside the configured
  checkpoint directory (/var/lib/neoland/checkpoints/adr/). This may
  indicate path traversal via crafted pipeline output or misconfiguration.
author: VoidNxLabs SOC
date: 2026/04/07
tags:
  - attack.defense_evasion
  - attack.t1036
  - neoland.checkpoint
logsource:
  category: file_event
  product: linux
detection:
  selection:
    Image|endswith: '/neoland'
    TargetFilename|contains: '.json'
    EventType: 'creation'
  filter_expected_path:
    TargetFilename|startswith:
      - '/var/lib/neoland/checkpoints/adr/'
      - '/tmp/neoland-test-'    # integration tests
  condition: selection and not filter_expected_path
falsepositives:
  - Developer running neoland from a non-standard directory
